<body>

    <div id="root"></div>

    <script type="text/javascript" src="https://seemynft.page/js/site.js"></script>

    <!-- SERVER_BOOTSTRAP_INJECTION_POINT: Server replaces this comment with window.__BOOTSTRAP__ script -->

    <script>
        (function() {
          var b = window.__BOOTSTRAP__ || {};
          window.appContext = {
            walletLoggedIn: (b.WALLET_LOGGED_INTO || '').toLowerCase() || 'anon',
            walletBeingViewed: (b.WALLET_BEING_VIEWED || b.WALLET_OWNER_GUID || '').toLowerCase() || 'none',
            tokenBeingViewed: (document.querySelector('meta[property="tokenid"]')?.content || '').toLowerCase() || 'none',
            wtob: (b.WTOB_GUID || b.WALLET_BEING_VIEWED_WTOB_GUID || '').toLowerCase() || 'none',
            ownershipType: (b.HOW_OWNED || b.WALLET_BEING_VIEWED_CUSTODY_TYPE || '').toLowerCase() || 'none'
          };

          window.dbReady = new Promise(function(resolve, reject) {
            var request = indexedDB.open('SeemyNFT', 1);
            request.onupgradeneeded = function(e) {
              var db = e.target.result;
              if (!db.objectStoreNames.contains('api')) {
                var store = db.createObjectStore('api', {
                  keyPath: [
                    'groupName',
                    'valueType',
                    'walletLoggedIn',
                    'walletBeingViewed',
                    'tokenBeingViewed',
                    'wtob',
                    'ownershipType'
                  ]
                });
                store.createIndex('by_groupName', 'groupName');
              }
            };
            request.onsuccess = function(e) { resolve(e.target.result); };
            request.onerror = function(e) { reject(e.target.error); };
          });

          window.apiCache = {
            get: function(groupName, valueType) {
              var ctx = window.appContext;
              return window.dbReady.then(function(db) {
                return new Promise(function(resolve, reject) {
                  var tx = db.transaction(['api'], 'readonly');
                  var req = tx.objectStore('api').get([
                    (groupName || '').toLowerCase(),
                    (valueType || '').toLowerCase(),
                    ctx.walletLoggedIn,
                    ctx.walletBeingViewed,
                    ctx.tokenBeingViewed,
                    ctx.wtob,
                    ctx.ownershipType
                  ]);
                  req.onsuccess = function() { resolve(req.result); };
                  req.onerror = function() { reject(req.error); };
                });
              });
            },
            put: function(actionValue) {
              var ctx = window.appContext;
              return window.dbReady.then(function(db) {
                return new Promise(function(resolve, reject) {
                  var tx = db.transaction(['api'], 'readwrite');
                  var record = {};
                  for (var key in actionValue) {
                    record[key] = actionValue[key];
                  }
                  record.groupName = (actionValue.groupName || '').toLowerCase();
                  record.valueType = (actionValue.valueType || '').toLowerCase();
                  record.walletLoggedIn = ctx.walletLoggedIn;
                  record.walletBeingViewed = ctx.walletBeingViewed;
                  record.tokenBeingViewed = ctx.tokenBeingViewed;
                  record.wtob = ctx.wtob;
                  record.ownershipType = ctx.ownershipType;
                  record.cachedAt = Date.now();
                  var req = tx.objectStore('api').put(record);
                  req.onsuccess = function() { resolve(req.result); };
                  req.onerror = function() { reject(req.error); };
                });
              });
            },
            invalidateGroup: function(groupName) {
              return window.dbReady.then(function(db) {
                return new Promise(function(resolve) {
                  var tx = db.transaction(['api'], 'readwrite');
                  var index = tx.objectStore('api').index('by_groupName');
                  index.openCursor((groupName || '').toLowerCase()).onsuccess = function(e) {
                    var cursor = e.target.result;
                    if (cursor) {
                      cursor.delete();
                      cursor.continue();
                    } else {
                      resolve();
                    }
                  };
                });
              });
            },
            getAll: function() {
              return window.dbReady.then(function(db) {
                return new Promise(function(resolve, reject) {
                  var tx = db.transaction(['api'], 'readonly');
                  var req = tx.objectStore('api').getAll();
                  req.onsuccess = function() { resolve(req.result); };
                  req.onerror = function() { reject(req.error); };
                });
              });
            },
            find: function(filterFn) {
              return this.getAll().then(function(all) {
                return all.filter(filterFn);
              });
            },
            clear: function() {
              return window.dbReady.then(function(db) {
                return new Promise(function(resolve, reject) {
                  var tx = db.transaction(['api'], 'readwrite');
                  var req = tx.objectStore('api').clear();
                  req.onsuccess = function() { resolve(); };
                  req.onerror = function() { reject(req.error); };
                });
              });
            }
          };
        })();
    </script>
